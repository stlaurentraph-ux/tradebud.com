              schema:
                $ref: "#/components/schemas/DownloadResponse"
  /v1/audit-events/export:
    get:
      tags: [Audit]
      summary: Export audit events
      parameters:
        - name: from_date
          in: query
          schema: { type: string, format: date }
        - name: to_date
          in: query
          schema: { type: string, format: date }
      responses:
        "200":
          description: Export job handle or stream

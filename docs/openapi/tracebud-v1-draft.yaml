      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DedupeMergeRequest"
  /v1/dedup-review-tasks/{id}/mark-distinct:
    post:
      tags: [Reviews]
      summary: Mark duplicate review as distinct
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Marked distinct
          content:
            application/json:

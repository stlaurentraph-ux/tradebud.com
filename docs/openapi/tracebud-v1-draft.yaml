          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedListResponse"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    IdPath:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
  responses:
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    BadRequest:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Invalid state transition or idempotency replay
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    UnprocessableEntity:
      description: Business validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    ErrorResponse:
      type: object
      properties:
        error_code: { type: string }
        message: { type: string }
        field_errors:
          type: array
          items: { type: object }
        request_id: { type: string }
      required: [error_code, message, request_id]
    GenericEntityResponse:
      type: object
      additionalProperties: true
      properties:
        id:
          type: string
          format: uuid
    PaginatedListResponse:
      type: object
      properties:
        items:
          type: array
          items: { type: object, additionalProperties: true }
        page_info:
          type: object
          additionalProperties: true
    DownloadResponse:
      type: object
      properties:
        download_url: { type: string, format: uri }
        expires_at: { type: string, format: date-time }
    CreateOrganisationRequest:
      type: object
      properties:
        legal_name: { type: string }
        country_iso: { type: string, minLength: 2, maxLength: 2 }
        commercial_tier: { type: integer, minimum: 1, maximum: 4 }
      required: [legal_name, country_iso, commercial_tier]
    OrganisationCreatedResponse:
      type: object
      properties:
        organisation_id: { type: string, format: uuid }
        created_at: { type: string, format: date-time }
      required: [organisation_id, created_at]
    CreateProducerRequest:
      type: object
      properties:
        owner_org_id: { type: string, format: uuid }
        full_name: { type: string }
        country_iso: { type: string, minLength: 2, maxLength: 2 }
      required: [owner_org_id, full_name, country_iso]
    ProducerCreatedResponse:
      type: object
      properties:
        producer_id: { type: string, format: uuid }
        verification_status: { type: string }
      required: [producer_id, verification_status]
    MemberInvitationRequest:
      type: object
      properties:
        email: { type: string, format: email }
        role: { type: string }
      required: [email, role]
    MemberInvitationResponse:
      type: object
      properties:
        invitation_id: { type: string, format: uuid }
        expires_at: { type: string, format: date-time }
      required: [invitation_id, expires_at]
    RequestCampaignCreateRequest:
      type: object
      properties:
        request_type:
          $ref: "#/components/schemas/RequestType"
        campaign_name: { type: string }
        description_template: { type: string }
        due_date: { type: string, format: date }
        targets:
          type: array
          items: { type: object, additionalProperties: true }
      required: [request_type, campaign_name, description_template, targets]
    RequestCampaignResponse:
      type: object
      properties:
        campaign_id: { type: string, format: uuid }
        status:
          $ref: "#/components/schemas/RequestCampaignStatus"
        total_targets: { type: integer }
        created_requests: { type: integer }
    CreatePlotRequest:
      type: object
      properties:
        producer_id: { type: string, format: uuid }
        commodity_id: { type: string, format: uuid }
        country_iso: { type: string, minLength: 2, maxLength: 2 }
        geolocation_mode:
          $ref: "#/components/schemas/GeolocationMode"
      required: [producer_id, commodity_id, country_iso, geolocation_mode]
    PlotCreatedResponse:
      type: object
      properties:
        plot_id: { type: string, format: uuid }
        deforestation_check_status:
          $ref: "#/components/schemas/DeforestationCheckStatus"
      required: [plot_id]
    AddGeometryVersionRequest:
      type: object
      properties:
        geometry: { type: object, additionalProperties: true }
        capture_method: { type: string }
      required: [geometry, capture_method]
    GeometryVersionResponse:
      type: object
      properties:
        geometry_version_id: { type: string, format: uuid }
        version_number: { type: integer }
    EvidenceUploadResponse:
      type: object
      properties:
        evidence_id: { type: string, format: uuid }
        parse_status:
          $ref: "#/components/schemas/EvidenceParseStatus"
    EvidenceParseStatusResponse:
      type: object
      properties:
        evidence_id: { type: string, format: uuid }
        parse_status:
          $ref: "#/components/schemas/EvidenceParseStatus"
        parse_confidence: { type: number }
    CreateConsentGrantRequest:
      type: object
      properties:
        producer_id: { type: string, format: uuid }
        grantee_org_id: { type: string, format: uuid }
        purpose_code:
          $ref: "#/components/schemas/ConsentPurposeCode"
        data_scope:
          type: array
          items: { type: string }
      required: [producer_id, grantee_org_id, purpose_code, data_scope]
    ConsentGrantResponse:
      type: object
      properties:
        consent_grant_id: { type: string, format: uuid }
        granted_at: { type: string, format: date-time }
        revoked_at: { type: string, format: date-time, nullable: true }
    CreateShipmentHeaderRequest:
      type: object
      properties:
        shipment_reference: { type: string }
        workflow_type: { type: string }
      required: [shipment_reference, workflow_type]
    AddShipmentLineRequest:
      type: object
      properties:
        commodity_id: { type: string, format: uuid }
        hs_code: { type: string }
        quantity_kg: { type: number, minimum: 0 }
      required: [commodity_id, hs_code, quantity_kg]
    SyncFlushResponse:
      type: object
      properties:
        accepted_count: { type: integer }
        conflict_count: { type: integer }
        rejected_count: { type: integer }
    SyncFlushRequest:
      type: object
      properties:
        client_event_batch:
          type: array
          items: { type: object, additionalProperties: true }
        hlc_timestamp: { type: string }
      required: [client_event_batch, hlc_timestamp]
    SyncConflictResolveRequest:
      type: object
      properties:
        resolution_strategy: { type: string }
        merged_payload:
          type: object
          additionalProperties: true
      required: [resolution_strategy]
    CreateBatchRequest:
      type: object
      properties:
        commodity_id: { type: string, format: uuid }
        batch_reference: { type: string }
        quantity_kg: { type: number, minimum: 0 }
      required: [commodity_id, batch_reference, quantity_kg]
    AddBatchInputRequest:
      type: object
      properties:
        source_type:
          $ref: "#/components/schemas/BatchInputSourceType"
        source_id: { type: string, format: uuid }
        quantity_kg: { type: number, minimum: 0 }
        evidence_id: { type: string, format: uuid, nullable: true }
        delivery_manifest_evidence_id: { type: string, format: uuid, nullable: true }
      required: [source_type, source_id, quantity_kg]
      allOf:
        - if:
            properties:
              source_type:
                const: PROCESSING_FACILITY
          then:
            required: [delivery_manifest_evidence_id]
    ShipmentHeaderResponse:
      type: object
      properties:
        shipment_header_id: { type: string, format: uuid }
        package_status:
          $ref: "#/components/schemas/ShipmentPackageStatus"
        sealed_at: { type: string, format: date-time, nullable: true }
    DdsRecordResponse:
      type: object
      properties:
        dds_record_id: { type: string, format: uuid }
        submission_status:
          $ref: "#/components/schemas/DdsSubmissionStatus"
        traces_submission_id: { type: string, nullable: true }
    ComplianceIssueCreateRequest:
      type: object
      properties:
        entity_type: { type: string }
        entity_id: { type: string, format: uuid }
        issue_type: { type: string }
        severity:
          $ref: "#/components/schemas/ComplianceIssueSeverity"
        description: { type: string }
      required: [entity_type, entity_id, issue_type, severity, description]
    ComplianceIssueAssignOwnerRequest:
      type: object
      properties:
        owner_person_id: { type: string, format: uuid }
        resolution_path: { type: string }
      required: [owner_person_id, resolution_path]
    ComplianceIssueResolveRequest:
      type: object
      properties:
        resolution_note: { type: string }
      required: [resolution_note]
    ComplianceIssueEscalateRequest:
      type: object
      properties:
        escalation_reason: { type: string }
      required: [escalation_reason]
    ComplianceIssueResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        status:
          $ref: "#/components/schemas/ComplianceIssueStatus"
        severity:
          $ref: "#/components/schemas/ComplianceIssueSeverity"
        owner_person_id: { type: string, format: uuid, nullable: true }
        resolved_at: { type: string, format: date-time, nullable: true }
    DedupeMergeRequest:
      type: object
      properties:
        survivor_entity_id: { type: string, format: uuid }
        resolution_note: { type: string }
      required: [survivor_entity_id, resolution_note]
    DedupeDecisionRequest:
      type: object
      properties:
        resolution_note: { type: string }
      required: [resolution_note]
    DedupeEscalateRequest:
      type: object
      properties:
        escalation_reason: { type: string }
      required: [escalation_reason]
    YieldExceptionApproveRequest:
      type: object
      properties:
        approved_factor: { type: number, minimum: 0 }
        resolution_note: { type: string }
      required: [approved_factor, resolution_note]
    YieldExceptionRejectRequest:
      type: object
      properties:
        resolution_note: { type: string }
      required: [resolution_note]
    RequestType:
      type: string
      enum:
        - MISSING_PRODUCER_PROFILE
        - MISSING_PLOT_GEOMETRY
        - MISSING_LAND_TITLE
        - MISSING_HARVEST_RECORD
        - YIELD_EVIDENCE
        - CONSENT_GRANT
        - DDS_REFERENCE
        - GENERAL_EVIDENCE
        - OTHER
    RequestCampaignStatus:
      type: string
      enum: [DRAFT, QUEUED, RUNNING, COMPLETED, PARTIAL, CANCELLED]
    GeolocationMode:
      type: string
      enum: [POLYGON, POINT, POSTAL_ADDRESS]
    DeforestationCheckStatus:
      type: string
      enum: [PENDING, CLEAR, FLAGGED, UNAVAILABLE, FAILED, UNDER_REVIEW]
    EvidenceParseStatus:
      type: string
      enum: [PENDING, IN_PROGRESS, COMPLETED, FAILED, MANUAL_REQUIRED]
    ConsentPurposeCode:
      type: string
      enum:
        - COMPLIANCE_COLLECTION
        - SHIPMENT_PREPARATION
        - DDS_SUBMISSION
        - DOWNSTREAM_REFERENCE_SHARING
        - AUDIT_RESPONSE
        - PORTABILITY_TRANSFER
    BatchInputSourceType:
      type: string
      enum: [PLOT_HARVEST, LOT, BATCH, EXTERNAL, PROCESSING_FACILITY]
    ShipmentPackageStatus:
      type: string
      enum: [DRAFT, READY, SEALED, SUBMITTED, ACCEPTED, REJECTED, ARCHIVED, ON_HOLD]
    DdsSubmissionStatus:
      type: string
      enum:
        - DRAFT
        - READY_TO_SUBMIT
        - SUBMITTED
        - ACCEPTED
        - REJECTED
        - PENDING_CONFIRMATION
        - AMENDMENT_DRAFT
        - AMENDED_SUBMITTED
        - WITHDRAWAL_REQUESTED
        - WITHDRAWN
        - SUPERSEDED
    ComplianceIssueSeverity:
      type: string
      enum: [INFO, WARNING, BLOCKING]
    ComplianceIssueStatus:
      type: string
      enum: [OPEN, IN_PROGRESS, RESOLVED, ESCALATED]
    PortabilityRequestType:
      type: string
      enum: [FULL, IDENTITY_ONLY, PLOT_ONLY]
    CreatePortabilityRequest:
      type: object
      properties:
        producer_id: { type: string, format: uuid }
        request_type:
          $ref: "#/components/schemas/PortabilityRequestType"
      required: [producer_id, request_type]
    CreateComplianceExportRequest:
      type: object
      properties:
        export_type:
          type: string
          enum: [FULL_COMPLIANCE_RECORD]
        from_date: { type: string, format: date }
        to_date: { type: string, format: date }
      required: [export_type, from_date, to_date]
    GenerateAnnualReportingSnapshotRequest:
      type: object
      properties:
        reporting_year: { type: integer, minimum: 2020 }
      required: [reporting_year]
    CreatePaymentMethodRequest:
      type: object
      properties:
        provider: { type: string, enum: [STRIPE] }
        tokenized_payment_ref: { type: string }
        billing_email: { type: string, format: email }
      required: [provider, tokenized_payment_ref, billing_email]
    CreateWebhookRequest:
      type: object
      properties:
        endpoint_url: { type: string, format: uri }
        event_types:
          type: array
          items: { type: string }
        secret_rotation_policy: { type: string }
      required: [endpoint_url, event_types, secret_rotation_policy]
    ComplianceExportCreateResponse:
      type: object
      properties:
        export_id: { type: string, format: uuid }
        status: { type: string, example: QUEUED }
        expires_at: { type: string, format: date-time }
    ComplianceExportStatusResponse:
      type: object
      properties:
        export_id: { type: string, format: uuid }
        status: { type: string }
        progress: { type: integer, minimum: 0, maximum: 100 }

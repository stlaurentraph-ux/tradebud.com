      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                revocation_reason:
                  type: string
              required: [revocation_reason]
      responses:
        "200":
          description: Consent revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsentGrantResponse"
  /v1/batches:
    post:
      tags: [Batches]
      summary: Create batch
      parameters:

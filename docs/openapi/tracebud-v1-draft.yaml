                $ref: "#/components/schemas/GenericEntityResponse"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DedupeDecisionRequest"
  /v1/dedup-review-tasks/{id}/escalate:
    post:
      tags: [Reviews]
      summary: Escalate duplicate review
      parameters:

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    IdPath:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
  responses:
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    BadRequest:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Invalid state transition or idempotency replay
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    UnprocessableEntity:
      description: Business validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    ErrorResponse:
      type: object
      properties:
        error_code: { type: string }
        message: { type: string }
        field_errors:
          type: array
          items: { type: object }
        request_id: { type: string }
      required: [error_code, message, request_id]
    GenericEntityResponse:
      type: object
      additionalProperties: true
      properties:
        id:
          type: string
          format: uuid
    LaunchSignupRequest:
      type: object
      required: [stage]
      properties:
        stage:
          type: string
          enum: [create_account, workspace_setup]
        workEmail:
          type: string
          format: email
        password:
          type: string
        fullName:
          type: string
        organizationName:
          type: string
        country:
          type: string
        primaryRole:
          type: string
          enum: [importer, exporter, compliance_manager, admin]
    LaunchSignupResponse:
      type: object
      additionalProperties: true
      properties:
        userId:
          type: string
        tenantId:
          type: string
        accessToken:
          type: string
        refreshToken:
          type: string
          nullable: true
        ok:
          type: boolean
    LaunchCommercialProfileRequest:
      type: object
      required: [skipped, primaryRole]
      properties:
        skipped:
          type: boolean
        primaryRole:
          type: string
          enum: [importer, exporter, compliance_manager, admin]
        teamSize:
          type: string
          nullable: true
        mainCommodity:
          type: string
          nullable: true
        primaryObjective:
          type: string
          nullable: true
          enum: [prepare_first_due_diligence_package, supplier_onboarding, risk_screening, audit_readiness]
    LaunchCommercialProfile:
      type: object
      required: [tenant_id, profile_skipped, updated_at]
      properties:
        tenant_id:
          type: string
        organization_name:
          type: string
          nullable: true
        country:
          type: string
          nullable: true
        primary_role:
          type: string
          nullable: true
          enum: [importer, exporter, compliance_manager, admin]
        team_size:
          type: string
          nullable: true
        main_commodity:
          type: string
          nullable: true
        primary_objective:
          type: string
          nullable: true
          enum: [prepare_first_due_diligence_package, supplier_onboarding, risk_screening, audit_readiness]
        profile_skipped:
          type: boolean
        updated_at:
          type: string
          format: date-time
    LaunchCommercialProfileResponse:
      type: object
      required: [ok, profile]
      properties:
        ok:
          type: boolean
        profile:
          $ref: "#/components/schemas/LaunchCommercialProfile"
    GatedEntryTelemetryListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/GatedEntryTelemetryEvent"
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
      required: [items, total, limit, offset]
    AssignmentExportTelemetryListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/AssignmentExportTelemetryEvent"
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
      required: [items, total, limit, offset]
    RiskScoreTelemetryListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/RiskScoreTelemetryEvent"
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
      required: [items, total, limit, offset]
    FilingActivityTelemetryListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/FilingActivityTelemetryEvent"
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
      required: [items, total, limit, offset]
    ChatThreadActivityTelemetryListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ChatThreadActivityTelemetryEvent"
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
      required: [items, total, limit, offset]
    WorkflowActivityTelemetryListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowActivityTelemetryEvent"
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
      required: [items, total, limit, offset]
    ChatThreadActivityTelemetryEvent:
      type: object
      properties:
        id:
          type: string
        timestamp:
          type: string
          format: date-time
        user_id:
          type: string
          nullable: true
        event_type:
          type: string
          enum:
            [
              chat_thread_created,
              chat_thread_message_posted,
              chat_thread_message_replayed,
              chat_thread_resolved,
              chat_thread_reopened,
              chat_thread_archived,
            ]
        payload:
          type: object
          properties:
            tenantId:
              type: string
            threadId:
              type: string
            recordId:
              type: string
              nullable: true
            messageId:
              type: string
            idempotencyKey:
              type: string
              nullable: true
            actorRole:
              type: string
              enum: [farmer, agent, exporter]
            actorUserId:
              type: string
              nullable: true
            capturedAt:
              type: string
              format: date-time
              nullable: true
          required: [tenantId, threadId, messageId, actorRole]
      required: [id, timestamp, event_type, payload]
    WorkflowActivityTelemetryEvent:
      type: object
      properties:
        id:
          type: string
        timestamp:
          type: string
          format: date-time
        user_id:
          type: string
          nullable: true
        event_type:
          type: string
          enum:
            [
              workflow_template_created,
              workflow_stage_transitioned,
              workflow_stage_sla_warning,
              workflow_stage_sla_breached,
              workflow_stage_sla_escalated,
              workflow_stage_sla_recovered,
            ]
        payload:
          type: object
          properties:
            tenantId:
              type: string
            templateId:
              type: string
            stageId:
              type: string
              nullable: true
            transitionId:
              type: string
              nullable: true
            fromStatus:
              type: string
              nullable: true
            toStatus:
              type: string
              nullable: true
            slaState:
              type: string
              nullable: true
              enum: [on_track, warning, breached, escalated]
            actorRole:
              type: string
              enum: [farmer, agent, exporter]
            actorUserId:
              type: string
              nullable: true
          required: [tenantId, templateId, actorRole]
      required: [id, timestamp, event_type, payload]
    ChatThreadStatusTransitionResponse:
      type: object
      properties:
        threadId:
          type: string
        status:
          type: string
          enum: [active, resolved, archived]
        changed:
          type: boolean
      required: [threadId, status, changed]
    DashboardDiagnosticsSummaryResponse:
      type: object
      properties:
        tenantId:
          type: string
        fromHours:
          type: integer
        totalDiagnostics:
          type: integer
        counters:
          type: object
          properties:
            gatedEntryAttempts:
              type: integer
            assignmentExportEvents:
              type: integer
            riskScoreEvents:
              type: integer
            filingActivityEvents:
              type: integer
            chatActivityEvents:
              type: integer
          required:
            [gatedEntryAttempts, assignmentExportEvents, riskScoreEvents, filingActivityEvents, chatActivityEvents]
        breakdown:
          type: object
          properties:
            assignmentPhase:
              type: object
              properties:
                requested: { type: integer }
                succeeded: { type: integer }
                failed: { type: integer }
              required: [requested, succeeded, failed]
            assignmentStatus:
              type: object
              properties:
                active: { type: integer }
                completed: { type: integer }
                cancelled: { type: integer }
              required: [active, completed, cancelled]
            riskBand:
              type: object
              properties:
                low: { type: integer }
                medium: { type: integer }
                high: { type: integer }
              required: [low, medium, high]
            filingFamily:
              type: object
              properties:
                generation: { type: integer }
                submission: { type: integer }
              required: [generation, submission]
            chatPhase:
              type: object
              properties:
                created: { type: integer }
                posted: { type: integer }
                replayed: { type: integer }
                resolved: { type: integer }
                reopened: { type: integer }
                archived: { type: integer }
              required: [created, posted, replayed, resolved, reopened, archived]
          required: [assignmentPhase, assignmentStatus, riskBand, filingFamily, chatPhase]
        readiness:
          type: object
          properties:
            hasAnyDiagnostics:
              type: boolean
            canExportDetailed:
              type: boolean
            latestEventAt:
              type: string
              format: date-time
              nullable: true
          required: [hasAnyDiagnostics, canExportDetailed, latestEventAt]
      required: [tenantId, fromHours, totalDiagnostics, counters, breakdown, readiness]
    GatedEntryTelemetryEvent:
      oneOf:
        - $ref: "#/components/schemas/GatedEntryAttemptEvent"
        - $ref: "#/components/schemas/GatedEntryExportedEvent"
      discriminator:
        propertyName: event_type
        mapping:

openapi: 3.0.3
info:
  title: Tracebud API (v1 Draft)
  version: "0.1.0-draft"
  description: |
    Draft OpenAPI artifact generated from TRACEBUD_V1_2_EUDR_SPEC.md Section 32.8.
    This document is intentionally minimal and should be expanded during implementation.
  license:
    name: Proprietary
    url: https://tracebud.com/legal
  x-tracebud-error-mapping:
    AUTH-001: INVALID_TOKEN
    AUTH-002: INSUFFICIENT_SCOPE
    VAL-001: FIELD_REQUIRED
    VAL-002: FIELD_INVALID
    TEN-001: TENANT_SCOPE_VIOLATION
    CON-001: CONSENT_REQUIRED
    SYNC-001: IDEMPOTENCY_REPLAY
    SYNC-002: CONFLICT_REVIEW_REQUIRED
    GEO-001: GEOMETRY_INVALID
    GEO-002: GEOMETRY_VARIANCE_EXCEEDED
    YLD-001: BENCHMARK_UNAVAILABLE
    DDS-001: INVALID_STATE_TRANSITION
    DDS-002: SUBMISSION_REJECTED
    EXT-001: TRACES_AUTH_FAILED
    EXT-002: TRACES_VALIDATION_FAULT
    BIL-001: PAYMENT_FAILED
    OPS-001: INTERNAL_ERROR
servers:
  - url: https://api.tracebud.com
    description: Production API
  - url: https://sandbox-api.tracebud.com
    description: Sandbox API
security:
  - bearerAuth: []
tags:
  - name: Organisations
    description: Organisation management and membership setup.
  - name: Producers
    description: Producer identity and profile creation.
  - name: Requests
    description: Evidence and campaign request workflows.
  - name: Plots
    description: Plot registration and geometry versioning.
  - name: Evidence
    description: Evidence document upload and parse tracking.
  - name: Consent
    description: Consent grant lifecycle operations.
  - name: Batches
    description: Batch creation, input linkage, and lineage lock.
  - name: Harvest
    description: Harvest capture, vouchers, DDS packaging, and readiness checks.
  - name: Reviews
    description: Yield exception and deduplication review actions.
  - name: Shipments
    description: Shipment header, lines, and seal operations.
  - name: DDS
    description: DDS submission, amendment, and retraction flows.
  - name: Sync
    description: Offline sync flush and conflict resolution endpoints.
  - name: Portability
    description: Data portability request and download workflows.
  - name: ComplianceExports
    description: Compliance export creation, status, and retrieval.
  - name: Audit
    description: Audit event export and telemetry diagnostics endpoints.
  - name: Reporting
    description: Annual snapshot generation and reporting retrieval.
  - name: ComplianceIssues
    description: Compliance issue tracking and remediation actions.
  - name: Billing
    description: Billing events and payment method management.
  - name: Webhooks
    description: Webhook registration and delivery inspection.
  - name: WorkflowTemplates
    description: Tenant-scoped workflow template and stage transition operations.
  - name: Integrations
    description: External integration health, submission, and status operations.
  - name: Launch
    description: Tenant launch lifecycle, signup onboarding, and commercial profile operations.
paths:
  /v1/organisations:
    post:
      tags: [Organisations]
      operationId: createOrganisation
      summary: Create organisation
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrganisationRequest"
      responses:
        "201":
          description: Organisation created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganisationCreatedResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /v1/producers:
    post:
      tags: [Producers]
      operationId: createProducer
      summary: Create producer
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProducerRequest"
      responses:
        "201":
          description: Producer created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProducerCreatedResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
  /v1/organisations/{id}/members/invitations:
    post:
      tags: [Organisations]
      operationId: inviteOrganisationMember
      summary: Invite organisation member
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MemberInvitationRequest"
      responses:
        "201":
          description: Invitation created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberInvitationResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /v1/requests/campaigns:
    post:
      tags: [Requests]
      operationId: createRequestCampaign
      summary: Create request campaign
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestCampaignCreateRequest"
      responses:
        "202":
          description: Campaign accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestCampaignResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /v1/requests/campaigns/{id}:
    get:
      tags: [Requests]
      operationId: getRequestCampaign
      summary: Get request campaign
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Campaign details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestCampaignResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/BadRequest"
  /v1/requests/campaigns/{id}/targets:
    get:
      tags: [Requests]
      operationId: listRequestCampaignTargets
      summary: List request campaign targets
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Target list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/BadRequest"
  /v1/requests/campaigns/{id}/decisions:
    get:
      tags: [Requests]
      operationId: listRequestCampaignDecisions
      summary: List request campaign decision timeline
      parameters:
        - $ref: "#/components/parameters/IdPath"
        - name: decision
          in: query
          required: false
          schema:
            type: string
            enum: [all, accept, refuse]
            default: all
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: Decision timeline
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestCampaignDecisionTimelineResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/BadRequest"
  /v1/plots:
    post:
      tags: [Plots]
      operationId: createPlot
      summary: Create plot
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePlotRequest"
      responses:
        "201":
          description: Plot created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlotCreatedResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /v1/plots/{id}/geometry-versions:
    post:
      tags: [Plots]
      operationId: addPlotGeometryVersion
      summary: Add plot geometry version
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddGeometryVersionRequest"
      responses:
        "201":
          description: Geometry version added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeometryVersionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/BadRequest"
  /v1/plots/{id}/photos-sync:
    post:
      tags: [Plots]
      operationId: syncPlotPhotos
      summary: Sync plot photos metadata
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SyncPlotPhotosRequest"
      responses:
        "201":
          description: Sync accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Missing tenant claim or assignment/ownership scope violation
  /v1/plots/{id}/legal-sync:
    post:
      tags: [Plots]
      operationId: syncPlotLegal
      summary: Sync plot legality metadata
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SyncPlotLegalRequest"
      responses:
        "201":
          description: Sync accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Missing tenant claim or assignment/ownership scope violation
  /v1/plots/{id}/evidence-sync:
    post:
      tags: [Plots]
      operationId: syncPlotEvidence
      summary: Sync plot evidence metadata
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SyncPlotEvidenceRequest"
      responses:
        "201":
          description: Sync accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Missing tenant claim or assignment/ownership scope violation
  /v1/plots/{id}/assignments:
    get:
      tags: [Plots]
      operationId: listPlotAssignments
      summary: List plot assignment history
      parameters:
        - $ref: "#/components/parameters/IdPath"
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [all, active, completed, cancelled]
            default: all
        - name: fromDays
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 30
        - name: agentUserId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: format
          in: query
          required: false
          schema:
            type: string
            enum: [json, csv]
            default: json
      responses:
        "200":
          description: Assignment rows ordered by latest assignment timestamp (JSON) or CSV export when format=csv
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/PlotAssignmentResponse"
                  total: { type: integer }
                  limit: { type: integer }
                  offset: { type: integer }
                  status:
                    type: string
                    enum: [all, active, completed, cancelled]
                  fromDays: { type: integer }
                  agentUserId:
                    type: string
                    format: uuid
                    nullable: true
                required: [items, total, limit, offset, status, fromDays, agentUserId]
        "400":
          description: Assignment relation unavailable
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Missing tenant claim or non-assignment-management role
    post:
      tags: [Plots]
      operationId: createPlotAssignment
      summary: Create active plot assignment
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePlotAssignmentRequest"
      responses:
        "201":
          description: Assignment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlotAssignmentResponse"
        "400":
          description: Assignment relation missing, duplicate assignment, or invalid payload
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Missing tenant claim or non-assignment-management role
  /v1/plots/assignments/{assignmentId}/complete:
    patch:
      tags: [Plots]
      operationId: completePlotAssignment
      summary: Complete active plot assignment
      parameters:
        - name: assignmentId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePlotAssignmentStatusRequest"
      responses:
        "200":
          description: Assignment completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlotAssignmentResponse"
        "400":
          description: Assignment not found, invalid transition, or relation missing
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Missing tenant claim or non-assignment-management role
  /v1/plots/assignments/{assignmentId}/cancel:
    patch:
      tags: [Plots]
      operationId: cancelPlotAssignment
      summary: Cancel active plot assignment
      parameters:
        - name: assignmentId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePlotAssignmentStatusRequest"
      responses:
        "200":
          description: Assignment cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlotAssignmentResponse"
        "400":
          description: Assignment not found, invalid transition, or relation missing
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Missing tenant claim or non-assignment-management role
  /v1/plots/{id}/geometry-history:
    get:
      tags: [Plots]
      operationId: getPlotGeometryHistory
      summary: Get plot geometry revision history
      parameters:
        - $ref: "#/components/parameters/IdPath"
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 100
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: sort
          in: query
          required: false
          schema:
            type: string
            enum: [desc, asc]
            default: desc
        - name: anomalyProfile
          in: query
          required: false
          schema:
            type: string
            enum: [strict, balanced, lenient]
            default: balanced
        - name: signalsOnly
          in: query
          required: false
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Immutable geometry revision audit events page
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/PlotGeometryHistoryEvent"
                  anomalies:
                    type: array
                    items:
                      $ref: "#/components/schemas/PlotGeometryHistoryAnomaly"
                  total: { type: integer }
                  limit: { type: integer }
                  offset: { type: integer }
                  sort:
                    type: string
                    enum: [desc, asc]
                  anomalyProfile:
                    type: string
                    enum: [strict, balanced, lenient]
                  signalsOnly:
                    type: boolean
                  anomalySummary:
                    type: object
                    properties:
                      total: { type: integer }
                      highSeverity: { type: integer }
                      mediumSeverity: { type: integer }
                      byType:
                        type: object
                        properties:
                          largeRevisionJump: { type: integer }
                          frequentSupersession: { type: integer }
                  anomalySummaryScope:
                    type: string
                    enum: [current_page, full_filtered_set]
                required: [items, anomalies, total, limit, offset, sort, anomalyProfile, signalsOnly, anomalySummary, anomalySummaryScope]
              examples:
                createdAndRevised:
                  value:
                    items:
                      - id: "e1a11111-1111-4111-8111-111111111111"
                        timestamp: "2026-04-16T09:12:10.000Z"
                        userId: "11111111-1111-4111-8111-111111111111"
                        deviceId: null
                        eventType: "plot_created"
                        payload:
                          plotId: "cccccccc-cccc-4ccc-8ccc-cccccccccccc"
                          details:
                            plotId: "cccccccc-cccc-4ccc-8ccc-cccccccccccc"
                            farmerId: "aaaaaaaa-aaaa-4aaa-8aaa-aaaaaaaaaaaa"
                            clientPlotId: "local-plot-1"
                            geometryNormalization:
                              originalAreaHa: 1.02
                              normalizedAreaHa: 1.01
                              correctionVariancePct: 0.98
                      - id: "e2b22222-2222-4222-8222-222222222222"
                        timestamp: "2026-04-16T10:45:33.000Z"
                        userId: "11111111-1111-4111-8111-111111111111"
                        deviceId: "device-field-01"
                        eventType: "plot_geometry_superseded"
                        payload:
                          plotId: "cccccccc-cccc-4ccc-8ccc-cccccccccccc"
                          details:
                            plotId: "cccccccc-cccc-4ccc-8ccc-cccccccccccc"
                            reason: "boundary correction after resurvey"
                            previous:
                              kind: "polygon"
                            next:
                              kind: "polygon"
                            geometryNormalization:
                              originalAreaHa: 1.01
                              normalizedAreaHa: 1.0
                              correctionVariancePct: 0.99
                    total: 2
                    anomalies:
                      - eventId: "e2b22222-2222-4222-8222-222222222222"
                        type: "large_revision_jump"
                        severity: "medium"
                        message: "Large revision jump: 3.20% area correction variance."
                    limit: 100
                    offset: 0
                    sort: "desc"
                    anomalyProfile: "balanced"
                    signalsOnly: false
                    anomalySummary:
                      total: 1
                      highSeverity: 1
                      mediumSeverity: 0
                      byType:
                        largeRevisionJump: 1
                        frequentSupersession: 0
                    anomalySummaryScope: "current_page"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /v1/plots/{id}/deforestation-decision:
    post:
      tags: [Plots]
      operationId: runPlotDeforestationDecision
      summary: Run historical deforestation decision for a plot
      parameters:
        - $ref: "#/components/parameters/IdPath"
        - name: cutoffDate
          in: query
          required: true
          schema:
            type: string
            pattern: '^\d{4}-\d{2}-\d{2}$'
          description: Historical decision cutoff date in YYYY-MM-DD format.
      responses:
        "200":
          description: Deforestation decision computed and logged
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  plotId: { type: string }
                  cutoffDate: { type: string }
                  verdict:
                    type: string
                    enum: [no_deforestation_detected, possible_deforestation_detected, unknown]
                  usedFallback: { type: boolean }
                  historicalSqlApplied: { type: boolean }
                  provider: { type: string }
                  providerMode:
                    type: string
                    enum: [glad_s2_primary, radd_fallback]
                  summary:
                    type: object
                    properties:
                      alertCount:
                        type: integer
                        nullable: true
                      alertAreaHa:
                        type: number
                        nullable: true
                  source:
                    type: object
                    properties:
                      dataset:
                        type: string
                        nullable: true
                      version:
                        type: string
                        nullable: true
                required: [ok, plotId, cutoffDate, verdict, usedFallback, historicalSqlApplied, provider, providerMode, summary, source]
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Only agents/exporters can run deforestation decisions
  /v1/plots/{id}/deforestation-decision-history:
    get:
      tags: [Plots]
      operationId: getPlotDeforestationDecisionHistory
      summary: Get historical deforestation decision history for a plot
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Immutable deforestation decision events
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id: { type: string }
                    timestamp: { type: string, format: date-time }
                    user_id: { type: string, nullable: true }
                    device_id: { type: string, nullable: true }
                    event_type:
                      type: string
                      enum: [plot_deforestation_decision_recorded]
                    payload:
                      type: object
                      properties:
                        plotId: { type: string }
                        cutoffDate: { type: string }
                        verdict:
                          type: string
                          enum: [no_deforestation_detected, possible_deforestation_detected, unknown]
                        provider: { type: string }
                        providerMode:
                          type: string
                          enum: [glad_s2_primary, radd_fallback]
                        summary:
                          type: object
                          properties:
                            alertCount: { type: integer, nullable: true }
                            alertAreaHa: { type: number, nullable: true }
        "401":
          $ref: "#/components/responses/Unauthorized"
  /v1/evidence-documents:
    post:
      tags: [Evidence]
      operationId: uploadEvidenceDocument
      summary: Upload evidence document
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                document_type:
                  type: string
                entity_ref:
                  type: string
              required: [file, document_type]
      responses:
        "202":
          description: Evidence accepted for parsing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvidenceUploadResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /v1/evidence-documents/{id}/parse-status:
    get:
      tags: [Evidence]
      operationId: getEvidenceParseStatus
      summary: Get parse status
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Parse status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvidenceParseStatusResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/BadRequest"
  /v1/consent-grants:
    post:
      tags: [Consent]
      operationId: createConsentGrant
      summary: Create consent grant
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateConsentGrantRequest"
      responses:
        "201":
          description: Consent grant created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsentGrantResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /v1/consent-grants/{id}/revoke:
    patch:
      tags: [Consent]
      operationId: revokeConsentGrant
      summary: Revoke consent grant
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                revocation_reason:
                  type: string
              required: [revocation_reason]
      responses:
        "200":
          description: Consent revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsentGrantResponse"

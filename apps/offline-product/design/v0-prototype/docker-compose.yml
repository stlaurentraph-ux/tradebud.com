version: '3.9'

services:
  tracebud-backend:
    build:
      context: ./tracebud-backend
    restart: unless-stopped
    environment:
      PORT: 4001
      DATABASE_URL: ${DATABASE_URL}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
    ports:
      - '4001:4001'


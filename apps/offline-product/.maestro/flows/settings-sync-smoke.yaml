appId: com.tracebud.app
---
# Settings → Backup section (Sync now when signed in, sign-in CTA otherwise).
# Bootstrap uninstall/reinstalls the app; avoid clearState so SQLite init from bootstrap survives.
- launchApp:
    clearState: false
- waitForAnimationToEnd
# SplashGate + SQLite boot (H13) — tab testIDs are stable across locales and RN navigation.
- extendedWaitUntil:
    visible:
      id: "tab-home"
    timeout: 120000
- extendedWaitUntil:
    visible:
      id: "tab-settings"
    timeout: 60000
- tapOn:
    id: "tab-settings"
- assertVisible:
    text: ".*Backup.*"
- assertVisible:
    text: ".*Sync now.*|.*Sign in to back up.*"
- tapOn:
    id: "settings-sync-now"
    optional: true

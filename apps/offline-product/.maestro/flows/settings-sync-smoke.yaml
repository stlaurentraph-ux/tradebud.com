appId: com.tracebud.app
---
# Settings → Backup section (Sync now when signed in, sign-in CTA otherwise).
# Bootstrap uninstall/reinstalls the app; avoid clearState so SQLite init from bootstrap survives.
- launchApp:
    clearState: false
- waitForAnimationToEnd
# First-launch welcome sheet blocks tab bar until dismissed (optional when boot profile seeded).
- tapOn:
    id: "welcome-account-skip"
    optional: true
# Boot profile anchor — visible when SQLite + auth boot finished and welcome is not blocking.
- extendedWaitUntil:
    visible:
      id: "maestro-boot-ready"
    timeout: 120000
- extendedWaitUntil:
    visible:
      id: "tab-settings"
    timeout: 60000
- tapOn:
    id: "tab-settings"
- assertVisible:
    text: ".*Backup.*"
- assertVisible:
    text: ".*Sync now.*|.*Sign in to back up.*"
- tapOn:
    id: "settings-sync-now"
    optional: true

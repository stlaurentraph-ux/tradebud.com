appId: com.tracebud.app
---
# Settings → Backup section (Sync now when signed in, sign-in CTA otherwise).
- launchApp:
    clearState: true
- waitForAnimationToEnd
# SplashGate + SQLite boot (H13) — use tab labels (reliable on Android; testIDs vary by RN nav).
- extendedWaitUntil:
    visible: "Home"
    timeout: 120000
- extendedWaitUntil:
    visible: "Settings"
    timeout: 60000
- tapOn:
    text: "Settings"
- assertVisible:
    text: ".*Backup.*"
- assertVisible:
    text: ".*Sync now.*|.*Sign in to back up.*"
- tapOn:
    id: "settings-sync-now"
    optional: true

appId: com.tracebud.app
---
# Prerequisite: CI bootstrap seeds Finca Norte via seed-maestro-simulator.mjs
- launchApp
- tapOn:
    id: "tab-my-plots"
- assertVisible:
    text: "Finca Norte"
- tapOn:
    id: "plot-card"
    index: 0
- assertVisible:
    id: "plot-nav-documents"
- tapOn:
    id: "plot-nav-documents"
- scrollUntilVisible:
    element:
      id: "plot-add-tenure-evidence"
    direction: DOWN
- tapOn:
    id: "plot-add-tenure-evidence"
- tapOn:
    text: ".*Cancel.*"
    optional: true
- back
- assertVisible:
    id: "plot-tenure-evidence-section"

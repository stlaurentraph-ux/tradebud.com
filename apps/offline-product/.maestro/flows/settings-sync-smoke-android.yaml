appId: com.tracebud.app
---
# Android CI golden path — cold start on x86_64 (Hermes verify can exceed 20 min).
# Waits on visible TextView label + testID; tab bar once boot profile is seeded.
- launchApp:
    clearState: false
    stopApp: true
- waitForAnimationToEnd
- tapOn:
    id: "welcome-account-skip"
    optional: true
- extendedWaitUntil:
    visible: ".*Maestro boot ready.*"
    timeout: 7200000
- extendedWaitUntil:
    visible:
      id: "maestro-boot-ready"
    timeout: 120000
- extendedWaitUntil:
    visible:
      id: "tab-settings"
    timeout: 120000
- tapOn:
    id: "tab-settings"
- scrollUntilVisible:
    element:
      id: "settings-cloud-parity-section"
    direction: DOWN
    timeout: 15000
    speed: 40
    visibilityPercentage: 20
    optional: true
- assertVisible:
    text: ".*Backup.*"
- assertVisible:
    text: ".*Sync now.*|.*Sign in to back up.*"
- tapOn:
    id: "settings-sync-now"
    optional: true

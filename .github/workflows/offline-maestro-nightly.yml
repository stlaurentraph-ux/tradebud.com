name: Offline Maestro nightly smoke

on:
  schedule:
    # Device smoke subset — 03:00 UTC daily (slice 4.8)
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      skip_bootstrap:
        description: Skip simulator bootstrap (app already installed on booted simulator)
        type: boolean
        default: false
      run_android_golden:
        description: Run full Android golden path on macos-15-intel (manual only — ~90 min)
        type: boolean
        default: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  maestro-nightly-preflight:
    name: Maestro nightly manifest guard
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/offline-product
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Use Node 20
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            apps/offline-product/package-lock.json

      - name: Install root dependencies
        working-directory: .
        run: npm ci

      - name: Install offline app dependencies
        run: npm ci

      - name: Maestro wiring preflight
        run: npm run qa:maestro:preflight

      - name: Maestro nightly smoke guard
        run: npm run qa:maestro:nightly:assert

  maestro-nightly-smoke:
    name: Maestro nightly smoke (macOS)
    needs: maestro-nightly-preflight
    runs-on: macos-latest
    timeout-minutes: 120
    env:
      IPHONE_DEVICE: iPhone 16
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    defaults:
      run:
        working-directory: apps/offline-product
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Use Node 20
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            apps/offline-product/package-lock.json

      - name: Install root dependencies
        working-directory: .
        run: npm ci

      - name: Install offline app dependencies
        run: npm ci

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Maestro CLI
        run: |
          set -euo pipefail
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Maestro wiring preflight
        run: npm run qa:maestro:preflight

      - name: Run Maestro nightly smoke subset
        if: github.event_name != 'workflow_dispatch' || inputs.skip_bootstrap != true
        run: npm run qa:maestro:nightly

      - name: Run Maestro nightly flows only (bootstrap skipped)
        if: github.event_name == 'workflow_dispatch' && inputs.skip_bootstrap == true
        run: |
          set -euo pipefail
          export MAESTRO_DEVICE_ID="$(xcrun simctl list devices booted | sed -n 's/.*(\([A-F0-9-]\{36\}\)).*/\1/p' | head -1)"
          if [[ -z "$MAESTRO_DEVICE_ID" ]]; then
            echo "No booted simulator — cannot skip bootstrap."
            exit 1
          fi
          export MAESTRO_APP_ID="com.tracebud.app"
          FLOWS="$(node -e "
          const manifest = require('./qa/automation-baselines/maestro-nightly-smoke.json');
          for (const item of manifest.nightlyFlows) console.log(item.flowFile);
          ")"
          while IFS= read -r flow; do
            xcrun simctl terminate "$MAESTRO_DEVICE_ID" "$MAESTRO_APP_ID" 2>/dev/null || true
            maestro test ".maestro/flows/$flow"
          done <<< "$FLOWS"

  maestro-android-golden-dispatch:
    name: Maestro golden path (Android, manual)
    needs: maestro-nightly-preflight
    if: github.event_name == 'workflow_dispatch' && inputs.run_android_golden == true
    runs-on: macos-15-intel
    timeout-minutes: 90
    env:
      MAESTRO_DRIVER_STARTUP_TIMEOUT: '300000'
      MAESTRO_SEED_SKIP: '1'
      MAESTRO_ANDROID_IN_APP_DB_SEED: '1'
      MAESTRO_JS_BOOT_FAIL_FAST: '1'
      MAESTRO_SEED_DB_WAIT_MS: '180000'
      MAESTRO_BOOT_WAIT_MS: '2700000'
      MAESTRO_BOOTSTRAP_WARM_MS: '1200000'
      MAESTRO_JS_BOOT_FAIL_FAST_MS: '1800000'
      MAESTRO_CI_RETRY_ATTEMPTS: '1'
      MAESTRO_ANDROID_ABI: x86_64
      MAESTRO_CI_ARTIFACT_DIR: ${{ github.workspace }}/apps/offline-product/ci-artifacts/maestro-android
      EXPO_PUBLIC_SENTRY_ENABLED: '0'
      GRADLE_OPTS: '-Dorg.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8'
      MAESTRO_ANDROID_APK_PATH: ${{ github.workspace }}/apps/offline-product/android/app/build/outputs/apk/debug/app-debug.apk
      EXPO_PUBLIC_API_URL: https://api.tracebud.com/api
      EXPO_PUBLIC_SUPABASE_URL: https://example.supabase.co
      EXPO_PUBLIC_OAUTH_BRIDGE_URL: https://app.tracebud.com/auth/callback
      EXPO_PUBLIC_FIELD_AUTH_CONFIRM_URL: https://app.tracebud.com/auth/confirm
      SENTRY_DISABLE_AUTO_UPLOAD: 'true'
    defaults:
      run:
        working-directory: apps/offline-product
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Use Node 20
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            apps/offline-product/package-lock.json

      - name: Install root dependencies
        working-directory: .
        run: npm ci

      - name: Install offline app dependencies
        run: npm ci

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Maestro CLI
        run: |
          set -euo pipefail
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Maestro wiring preflight
        run: npm run qa:maestro:preflight

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-maestro-${{ runner.os }}-${{ hashFiles('apps/offline-product/package-lock.json') }}
          restore-keys: |
            gradle-maestro-${{ runner.os }}-

      - name: Assemble debug APK (outside emulator)
        run: bash ./scripts/maestro-ci-assemble-android-apk.sh

      - name: Run Maestro golden path on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: default
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          ram-size: 4096M
          cores: 4
          emulator-boot-timeout: 1800
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -memory 4096
          script: cd apps/offline-product && npm run qa:maestro:golden-path:android

      - name: Upload Android Maestro debug artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-nightly-android-golden-debug-${{ github.run_id }}
          path: apps/offline-product/ci-artifacts/maestro-android/
          if-no-files-found: ignore

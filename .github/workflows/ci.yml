name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  backend:
    name: Backend build, lint, and tests
    runs-on: ubuntu-latest
    env:
      TEST_DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
    defaults:
      run:
        working-directory: tracebud-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Use Node 20
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: tracebud-backend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npx jest --runInBand --testPathIgnorePatterns "\\.int\\.spec\\.ts$"

      - name: Ensure integration DB secret exists
        run: |
          if [ -z "$TEST_DATABASE_URL" ]; then
            echo "TEST_DATABASE_URL is required for PostGIS integration tests."
            exit 1
          fi

      - name: Integration tests (PostGIS)
        run: npm run test:integration

      - name: Ownership integration tests (required)
        run: |
          set -euo pipefail
          npm run test:integration:ownership | tee ownership-integration-output.txt
          if grep -Eq "[1-9][0-9]* skipped" ownership-integration-output.txt; then
            echo "Ownership integration suite must not be skipped in CI."
            exit 1
          fi

      - name: Publish ownership integration summary
        run: |
          {
            echo "## Ownership Integration Evidence"
            echo ""
            echo "- Command: \`npm run test:integration:ownership\`"
            echo "- Output snapshot:"
            echo ""
            echo '```text'
            grep -E "Test Suites:|Tests:|Ran all test suites" ownership-integration-output.txt || true
            echo '```'
            echo ""
            echo "_Note: This lane is expected to execute non-skipped in CI because TEST_DATABASE_URL is required in this job._"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload ownership integration log artifact
        uses: actions/upload-artifact@v5
        with:
          name: backend-ownership-integration-log
          path: tracebud-backend/ownership-integration-output.txt

  app:
    name: Expo app lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tracebud-offline-app
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Use Node 20
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: tracebud-offline-app/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

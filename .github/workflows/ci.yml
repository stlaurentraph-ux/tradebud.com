name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  backend:
    name: Backend build & lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tracebud-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: tracebud-backend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  app:
    name: Expo app lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tracebud-offline-app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: tracebud-offline-app/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint


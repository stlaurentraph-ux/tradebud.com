name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  backend:
    name: Backend build, lint, and tests
    runs-on: ubuntu-latest
    env:
      TEST_DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
    defaults:
      run:
        working-directory: tracebud-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: tracebud-backend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npx jest --runInBand --testPathIgnorePatterns "\\.int\\.spec\\.ts$"

      - name: Ensure integration DB secret exists
        run: |
          if [ -z "$TEST_DATABASE_URL" ]; then
            echo "TEST_DATABASE_URL is required for PostGIS integration tests."
            exit 1
          fi

      - name: Integration tests (PostGIS)
        run: npm run test:integration

  app:
    name: Expo app lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tracebud-offline-app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: tracebud-offline-app/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

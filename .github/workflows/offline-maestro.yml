name: Offline Maestro

# Cost hygiene (H25): run locally before push — see product-os/04-quality/maestro-ci-cost-runbook.md
#   npm run qa:maestro:prepush        (static, any OS)
#   npm run qa:maestro:prepush:full   (macOS + local iOS golden path)
# PR: maestro-cost-gate skips macOS when already green + android-only delta; concurrency cancels stale runs.

on:
  push:
    branches: [main, master]
    paths:
      - 'apps/offline-product/.maestro/**'
      - 'apps/offline-product/scripts/maestro*.**'
      - 'apps/offline-product/scripts/*maestro*'
      - 'apps/offline-product/qa/automation-baselines/maestro-flows.json'
      - 'apps/offline-product/scripts/maestro-ci-golden-path-android.sh'
      - 'apps/offline-product/scripts/maestro-ci-bootstrap-emulator.sh'
      - 'apps/offline-product/scripts/maestro-ci-assemble-android-apk.sh'
      - 'apps/offline-product/scripts/maestro-ci-assemble-ios-simulator.sh'
      - 'apps/offline-product/qa/automation-baselines/maestro-boot-state.json'
      - 'product-os/04-quality/maestro-boot-state-registry.md'
      - 'product-os/04-quality/maestro-golden-path-ci.json'
      - 'apps/offline-product/app.json'
      - 'apps/offline-product/eas.json'
      - '.github/workflows/offline-maestro.yml'
  pull_request:
    paths:
      - 'apps/offline-product/.maestro/**'
      - 'apps/offline-product/scripts/maestro*.**'
      - 'apps/offline-product/scripts/*maestro*'
      - 'apps/offline-product/qa/automation-baselines/maestro-flows.json'
      - 'apps/offline-product/scripts/maestro-ci-golden-path-android.sh'
      - 'apps/offline-product/scripts/maestro-ci-bootstrap-emulator.sh'
      - 'apps/offline-product/scripts/maestro-ci-assemble-android-apk.sh'
      - 'apps/offline-product/scripts/maestro-ci-assemble-ios-simulator.sh'
      - 'apps/offline-product/qa/automation-baselines/maestro-boot-state.json'
      - 'product-os/04-quality/maestro-boot-state-registry.md'
      - 'product-os/04-quality/maestro-golden-path-ci.json'
      - 'apps/offline-product/app/_layout.tsx'
      - 'apps/offline-product/components/layout/MaestroBootReadyMarker.tsx'
      - 'apps/offline-product/features/state/AppStateContext.tsx'
      - '.github/workflows/offline-maestro.yml'
  workflow_dispatch:
    inputs:
      run_golden_path:
        description: Run golden-path Maestro E2E (settings-sync-smoke on simulator)
        type: boolean
        default: false
      run_flows:
        description: Run all Maestro flows (requires Tracebud app on booted iOS simulator)
        type: boolean
        default: false
      flow:
        description: Optional single flow filename under .maestro/flows/
        required: false
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: offline-maestro-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  maestro-preflight:
    name: Maestro wiring preflight
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/offline-product
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Use Node 20
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            apps/offline-product/package-lock.json

      - name: Install root dependencies
        working-directory: .
        run: npm ci

      - name: Install offline app dependencies
        run: npm ci

      - name: Maestro wiring preflight
        run: npm run qa:maestro:preflight

  maestro-cost-gate:
    name: Maestro platform cost gate
    needs: maestro-preflight
    if: >
      github.event_name == 'pull_request' ||
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.run_golden_path == true)
    runs-on: ubuntu-latest
    outputs:
      run_ios: ${{ steps.gate.outputs.run_ios }}
      run_android: ${{ steps.gate.outputs.run_android }}
      skip_reason_ios: ${{ steps.gate.outputs.skip_reason_ios }}
      skip_reason_android: ${{ steps.gate.outputs.skip_reason_android }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Paths filter (PR)
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            ios:
              - 'apps/offline-product/scripts/maestro-ci-assemble-ios-simulator.sh'
              - 'apps/offline-product/scripts/maestro-ci-golden-path.sh'
              - 'apps/offline-product/scripts/maestro-ci-bootstrap-simulator.sh'
              - 'apps/offline-product/scripts/seed-maestro-simulator.mjs'
            android:
              - 'apps/offline-product/scripts/maestro-ci-assemble-android-apk.sh'
              - 'apps/offline-product/scripts/maestro-ci-golden-path-android.sh'
              - 'apps/offline-product/scripts/maestro-ci-bootstrap-emulator.sh'
              - 'apps/offline-product/scripts/seed-maestro-boot-profile.mjs'
            shared:
              - 'apps/offline-product/.maestro/**'
              - 'apps/offline-product/qa/automation-baselines/maestro-flows.json'
              - 'apps/offline-product/qa/automation-baselines/maestro-boot-state.json'
              - 'apps/offline-product/components/layout/MaestroBootReadyMarker.tsx'
              - 'apps/offline-product/app/_layout.tsx'
              - 'apps/offline-product/features/state/AppStateContext.tsx'
              - 'apps/offline-product/features/testing/maestroBootStateRegistry.ts'
              - 'product-os/04-quality/maestro-boot-state-registry.md'
              - 'product-os/04-quality/maestro-golden-path-ci.json'
              - '.github/workflows/offline-maestro.yml'

      - name: Decide platforms
        id: gate
        working-directory: apps/offline-product
        env:
          GITHUB_TOKEN: ${{ github.token }}
          MAESTRO_PATH_IOS: ${{ steps.filter.outputs.ios }}
          MAESTRO_PATH_ANDROID: ${{ steps.filter.outputs.android }}
          MAESTRO_PATH_SHARED: ${{ steps.filter.outputs.shared }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            node ./scripts/maestro-ci-platform-gate.mjs
          else
            echo "run_ios=true" >> "$GITHUB_OUTPUT"
            echo "run_android=true" >> "$GITHUB_OUTPUT"
            echo "skip_reason_ios=full_matrix" >> "$GITHUB_OUTPUT"
            echo "skip_reason_android=full_matrix" >> "$GITHUB_OUTPUT"
          fi

  maestro-golden-path:
    name: Maestro golden path (macOS)
    needs: maestro-cost-gate
    if: >
      needs.maestro-cost-gate.outputs.run_ios == 'true' &&
      (
        github.event_name == 'pull_request' ||
        github.event_name == 'push' ||
        (github.event_name == 'workflow_dispatch' && inputs.run_golden_path == true)
      )
    runs-on: macos-latest
    timeout-minutes: 120
    env:
      IPHONE_DEVICE: iPhone 16
      EXPO_PUBLIC_API_URL: https://api.tracebud.com/api
      EXPO_PUBLIC_SUPABASE_URL: https://example.supabase.co
      EXPO_PUBLIC_OAUTH_BRIDGE_URL: https://app.tracebud.com/auth/callback
      EXPO_PUBLIC_FIELD_AUTH_CONFIRM_URL: https://app.tracebud.com/auth/confirm
      SENTRY_DISABLE_AUTO_UPLOAD: 'true'
      MAESTRO_SEED_SKIP: '1'
      MAESTRO_SEED_DB_WAIT_MS: '120000'
    defaults:
      run:
        working-directory: apps/offline-product
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Use Node 20
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            apps/offline-product/package-lock.json

      - name: Install root dependencies
        working-directory: .
        run: npm ci

      - name: Install offline app dependencies
        run: npm ci

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Maestro CLI
        run: |
          set -euo pipefail
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Maestro wiring preflight
        run: npm run qa:maestro:preflight

      - name: Assemble iOS simulator app (PR branch testIDs)
        run: bash ./scripts/maestro-ci-assemble-ios-simulator.sh

      - name: Run Maestro golden path
        run: npm run qa:maestro:golden-path

  maestro-golden-path-android:
    name: Maestro golden path (Android)
    needs: maestro-cost-gate
    if: >
      needs.maestro-cost-gate.outputs.run_android == 'true' &&
      (
        github.event_name == 'pull_request' ||
        github.event_name == 'push' ||
        (github.event_name == 'workflow_dispatch' && inputs.run_golden_path == true)
      )
    runs-on: macos-latest
    timeout-minutes: 180
    env:
      MAESTRO_DRIVER_STARTUP_TIMEOUT: '300000'
      MAESTRO_SEED_SKIP: '1'
      MAESTRO_SEED_DB_WAIT_MS: '180000'
      MAESTRO_BOOT_WAIT_MS: '7200000'
      MAESTRO_BOOTSTRAP_WARM_MS: '900000'
      MAESTRO_CI_RETRY_ATTEMPTS: '1'
      MAESTRO_ANDROID_ABI: arm64-v8a
      EXPO_PUBLIC_SENTRY_ENABLED: '0'
      GRADLE_OPTS: '-Dorg.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8'
      MAESTRO_ANDROID_APK_PATH: ${{ github.workspace }}/apps/offline-product/android/app/build/outputs/apk/debug/app-debug.apk
      EXPO_PUBLIC_API_URL: https://api.tracebud.com/api
      EXPO_PUBLIC_SUPABASE_URL: https://example.supabase.co
      EXPO_PUBLIC_OAUTH_BRIDGE_URL: https://app.tracebud.com/auth/callback
      EXPO_PUBLIC_FIELD_AUTH_CONFIRM_URL: https://app.tracebud.com/auth/confirm
      SENTRY_DISABLE_AUTO_UPLOAD: 'true'
    defaults:
      run:
        working-directory: apps/offline-product
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Use Node 20
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            apps/offline-product/package-lock.json

      - name: Install root dependencies
        working-directory: .
        run: npm ci

      - name: Install offline app dependencies
        run: npm ci

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Maestro CLI
        run: |
          set -euo pipefail
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Maestro wiring preflight
        run: npm run qa:maestro:preflight

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-maestro-${{ runner.os }}-${{ hashFiles('apps/offline-product/package-lock.json') }}
          restore-keys: |
            gradle-maestro-${{ runner.os }}-

      - name: Assemble debug APK (outside emulator)
        run: bash ./scripts/maestro-ci-assemble-android-apk.sh

      - name: Run Maestro golden path on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: default
          arch: arm64-v8a
          profile: pixel_6
          disable-animations: true
          ram-size: 4096M
          cores: 4
          emulator-boot-timeout: 1800
          emulator-options: -no-snapshot-save -no-window -gpu host -noaudio -no-boot-anim
          script: cd apps/offline-product && npm run qa:maestro:golden-path:android

  maestro-macos:
    name: Maestro macOS CLI smoke
    needs: maestro-preflight
    if: github.event_name == 'workflow_dispatch' && inputs.run_flows == true
    runs-on: macos-latest
    defaults:
      run:
        working-directory: apps/offline-product
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Use Node 20
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Maestro CLI
        run: |
          set -euo pipefail
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Maestro CLI version
        run: maestro --version

      - name: Maestro wiring preflight
        run: npm run qa:maestro:preflight

      - name: Run Maestro flows (manual)
        continue-on-error: true
        run: |
          set -euo pipefail
          if ! xcrun simctl list devices booted 2>/dev/null | grep -q Booted; then
            echo "No booted iOS simulator — install com.tracebud.app and boot Simulator first."
            exit 1
          fi
          FLOW="${{ inputs.flow }}"
          if [ -n "${FLOW}" ]; then
            npm run test:maestro -- --include "${FLOW}"
          else
            npm run test:maestro
          fi

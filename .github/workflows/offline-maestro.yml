name: Offline Maestro

on:
  push:
    branches: [main, master]
    paths:
      - 'apps/offline-product/.maestro/**'
      - 'apps/offline-product/scripts/maestro*.**'
      - 'apps/offline-product/scripts/*maestro*'
      - 'apps/offline-product/qa/automation-baselines/maestro-flows.json'
      - 'apps/offline-product/scripts/maestro-ci-golden-path-android.sh'
      - 'apps/offline-product/scripts/maestro-ci-bootstrap-emulator.sh'
      - 'apps/offline-product/scripts/maestro-ci-assemble-android-apk.sh'
      - 'apps/offline-product/scripts/maestro-ci-assemble-ios-simulator.sh'
      - 'apps/offline-product/qa/automation-baselines/maestro-boot-state.json'
      - 'product-os/04-quality/maestro-boot-state-registry.md'
      - 'product-os/04-quality/maestro-golden-path-ci.json'
      - 'apps/offline-product/app.json'
      - 'apps/offline-product/eas.json'
      - '.github/workflows/offline-maestro.yml'
  pull_request:
    paths:
      - 'apps/offline-product/.maestro/**'
      - 'apps/offline-product/scripts/maestro*.**'
      - 'apps/offline-product/scripts/*maestro*'
      - 'apps/offline-product/qa/automation-baselines/maestro-flows.json'
      - 'apps/offline-product/scripts/maestro-ci-golden-path-android.sh'
      - 'apps/offline-product/scripts/maestro-ci-bootstrap-emulator.sh'
      - 'apps/offline-product/scripts/maestro-ci-assemble-android-apk.sh'
      - 'apps/offline-product/scripts/maestro-ci-assemble-ios-simulator.sh'
      - 'apps/offline-product/qa/automation-baselines/maestro-boot-state.json'
      - 'product-os/04-quality/maestro-boot-state-registry.md'
      - 'product-os/04-quality/maestro-golden-path-ci.json'
      - '.github/workflows/offline-maestro.yml'
  workflow_dispatch:
    inputs:
      run_golden_path:
        description: Run golden-path Maestro E2E (settings-sync-smoke on simulator)
        type: boolean
        default: false
      run_flows:
        description: Run all Maestro flows (requires Tracebud app on booted iOS simulator)
        type: boolean
        default: false
      flow:
        description: Optional single flow filename under .maestro/flows/
        required: false
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  maestro-preflight:
    name: Maestro wiring preflight
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/offline-product
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Use Node 20
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            apps/offline-product/package-lock.json

      - name: Install root dependencies
        working-directory: .
        run: npm ci

      - name: Install offline app dependencies
        run: npm ci

      - name: Maestro wiring preflight
        run: npm run qa:maestro:preflight

  maestro-golden-path:
    name: Maestro golden path (macOS)
    needs: maestro-preflight
    if: >
      github.event_name == 'pull_request' ||
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.run_golden_path == true)
    runs-on: macos-latest
    timeout-minutes: 120
    env:
      IPHONE_DEVICE: iPhone 16
      EXPO_PUBLIC_API_URL: https://api.tracebud.com/api
      EXPO_PUBLIC_SUPABASE_URL: https://example.supabase.co
      EXPO_PUBLIC_OAUTH_BRIDGE_URL: https://app.tracebud.com/auth/callback
      EXPO_PUBLIC_FIELD_AUTH_CONFIRM_URL: https://app.tracebud.com/auth/confirm
      SENTRY_DISABLE_AUTO_UPLOAD: 'true'
      MAESTRO_SEED_SKIP: '1'
    defaults:
      run:
        working-directory: apps/offline-product
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Use Node 20
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            apps/offline-product/package-lock.json

      - name: Install root dependencies
        working-directory: .
        run: npm ci

      - name: Install offline app dependencies
        run: npm ci

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Maestro CLI
        run: |
          set -euo pipefail
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Maestro wiring preflight
        run: npm run qa:maestro:preflight

      - name: Assemble iOS simulator app (PR branch testIDs)
        run: bash ./scripts/maestro-ci-assemble-ios-simulator.sh

      - name: Run Maestro golden path
        run: npm run qa:maestro:golden-path

  maestro-golden-path-android:
    name: Maestro golden path (Android)
    needs: maestro-preflight
    if: >
      github.event_name == 'pull_request' ||
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.run_golden_path == true)
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      MAESTRO_DRIVER_STARTUP_TIMEOUT: '300000'
      MAESTRO_SEED_SKIP: '1'
      EXPO_PUBLIC_API_URL: https://api.tracebud.com/api
      EXPO_PUBLIC_SUPABASE_URL: https://example.supabase.co
      EXPO_PUBLIC_OAUTH_BRIDGE_URL: https://app.tracebud.com/auth/callback
      EXPO_PUBLIC_FIELD_AUTH_CONFIRM_URL: https://app.tracebud.com/auth/confirm
      SENTRY_DISABLE_AUTO_UPLOAD: 'true'
    defaults:
      run:
        working-directory: apps/offline-product
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Use Node 20
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            apps/offline-product/package-lock.json

      - name: Install root dependencies
        working-directory: .
        run: npm ci

      - name: Install offline app dependencies
        run: npm ci

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Maestro CLI
        run: |
          set -euo pipefail
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Maestro wiring preflight
        run: npm run qa:maestro:preflight

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-maestro-${{ runner.os }}-${{ hashFiles('apps/offline-product/package-lock.json') }}
          restore-keys: |
            gradle-maestro-${{ runner.os }}-

      - name: Assemble debug APK (outside emulator)
        run: bash ./scripts/maestro-ci-assemble-android-apk.sh

      - name: Run Maestro golden path on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          emulator-boot-timeout: 1200
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          script: cd apps/offline-product && npm run qa:maestro:golden-path:android

  maestro-macos:
    name: Maestro macOS CLI smoke
    needs: maestro-preflight
    if: github.event_name == 'workflow_dispatch' && inputs.run_flows == true
    runs-on: macos-latest
    defaults:
      run:
        working-directory: apps/offline-product
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Use Node 20
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Maestro CLI
        run: |
          set -euo pipefail
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Maestro CLI version
        run: maestro --version

      - name: Maestro wiring preflight
        run: npm run qa:maestro:preflight

      - name: Run Maestro flows (manual)
        continue-on-error: true
        run: |
          set -euo pipefail
          if ! xcrun simctl list devices booted 2>/dev/null | grep -q Booted; then
            echo "No booted iOS simulator — install com.tracebud.app and boot Simulator first."
            exit 1
          fi
          FLOW="${{ inputs.flow }}"
          if [ -n "${FLOW}" ]; then
            npm run test:maestro -- --include "${FLOW}"
          else
            npm run test:maestro
          fi

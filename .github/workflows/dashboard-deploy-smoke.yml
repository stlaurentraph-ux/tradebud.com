name: Dashboard post-deploy smoke

on:
  deployment_status:
  workflow_dispatch:
    inputs:
      base_url:
        description: Override DASHBOARD_BASE_URL for manual run
        required: false
        type: string
      wait_for_deploy:
        description: Poll /login until ready before smoke (use after Vercel deploy)
        required: false
        type: boolean
        default: false
  repository_dispatch:
    types: [dashboard-deploy-success]
  push:
    branches: [main]
    paths:
      - 'apps/dashboard-product/**'
      - '.github/workflows/dashboard-deploy-smoke.yml'
      - 'tracebud-backend/scripts/mint-smoke-bearer-token.mjs'
      - 'tracebud-backend/scripts/smoke-bearer-ci-preflight.mjs'

jobs:
  smoke:
    name: Dashboard post-deploy smoke
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      github.event_name == 'repository_dispatch' ||
      (
        github.event.deployment_status.state == 'success' &&
        (
          github.event.deployment.environment == 'Production' ||
          github.event.deployment.environment == 'production'
        )
      )
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Use Node 20
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Mint smoke bearer token
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TRACEBUD_SMOKE_BEARER_TOKEN: ${{ secrets.TRACEBUD_SMOKE_BEARER_TOKEN }}
        run: node tracebud-backend/scripts/smoke-bearer-ci-preflight.mjs --github-env

      - name: Run dashboard post-deploy smoke
        env:
          DASHBOARD_BASE_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.base_url || secrets.DASHBOARD_BASE_URL }}
        run: |
          set -euo pipefail
          if [ -z "${DASHBOARD_BASE_URL:-}" ]; then
            echo "DASHBOARD_BASE_URL is not configured — skipping dashboard post-deploy smoke."
            echo "Add the secret in GitHub Settings → Secrets and variables → Actions."
            exit 0
          fi
          if [ -z "${TRACEBUD_SMOKE_BEARER_TOKEN:-}" ]; then
            echo "Smoke auth not configured — skipping dashboard post-deploy smoke."
            echo "Add SUPABASE_URL, SUPABASE_ANON_KEY, and SUPABASE_SERVICE_ROLE_KEY (or legacy TRACEBUD_SMOKE_BEARER_TOKEN)."
            exit 0
          fi
          if [ "${{ github.event_name }}" = "push" ]; then
            export DASHBOARD_SMOKE_WAIT_FOR_DEPLOY=1
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.wait_for_deploy }}" = "true" ]; then
            export DASHBOARD_SMOKE_WAIT_FOR_DEPLOY=1
          fi
          node apps/dashboard-product/scripts/run-dashboard-onboarding-smoke.mjs

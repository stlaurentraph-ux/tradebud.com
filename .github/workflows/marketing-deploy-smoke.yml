name: Marketing post-deploy smoke

# Triggered by Vercel production deployment_status; preview deploys skip the smoke job.
# Concurrency collapses duplicate production webhooks.

on:
  deployment_status:
  workflow_dispatch:
    inputs:
      base_url:
        description: Override MARKETING_SMOKE_BASE_URL for manual run
        required: false
        type: string

env:
  DEPLOY_SMOKE_STRICT: ${{ github.event_name == 'workflow_dispatch' && '0' || '1' }}

concurrency:
  group: marketing-deploy-smoke-${{ github.event.deployment.id || github.run_id }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Marketing post-deploy smoke
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.deployment_status.state == 'success' &&
        (
          github.event.deployment.environment == 'Production' ||
          github.event.deployment.environment == 'production'
        )
      )
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Use Node 20
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Assert deploy smoke configuration
        env:
          MARKETING_SMOKE_BASE_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.base_url || secrets.MARKETING_SMOKE_BASE_URL }}
        run: node scripts/assert-deploy-smoke-secrets.mjs marketing

      - name: Run marketing post-deploy smoke
        env:
          MARKETING_SMOKE_BASE_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.base_url || secrets.MARKETING_SMOKE_BASE_URL }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${MARKETING_SMOKE_BASE_URL:-}" ]; then
            echo "No base URL configured — smoke run skipped (non-strict manual dispatch only)."
            exit 0
          fi
          node apps/marketing/scripts/marketing-post-deploy-smoke.mjs

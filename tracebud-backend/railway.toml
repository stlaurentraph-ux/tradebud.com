# Deprecated: Railway service Root Directory must be the monorepo root (`.`).
# Use /railway.toml at repo root with dockerfilePath = "tracebud-backend/Dockerfile".
#
# If Root Directory is still tracebud-backend, Docker cannot resolve
# @tracebud/import-v1-canonical (workspace package under packages/).

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Railway deploy config (https://railway.app)
# Root directory for this service: tracebud-backend (set in Railway dashboard if monorepo)

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

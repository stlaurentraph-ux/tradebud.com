<!--
  Email CR2 — Campaign request reminder #1
  Subject : Reminder: {{senderOrgLabel}} is waiting for your compliance response
-->
<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Reminder: compliance request on Tracebud</title>
  <style type="text/css">
    body,table,td,a{-webkit-text-size-adjust:100%;-ms-text-size-adjust:100%}
    @media only screen and (max-width:600px){
      .email-container{width:100%!important}
      .content-cell{padding:28px 20px!important}
      .cta-btn{width:100%!important;display:block!important;box-sizing:border-box!important}
    }
  </style>
</head>
<body style="margin:0;padding:0;background-color:#F0FDF4;">
  <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="background-color:#F0FDF4;">
    <tr>
      <td align="center" style="padding:32px 16px 48px;">
        <table class="email-container" role="presentation" cellpadding="0" cellspacing="0" border="0" width="600" style="max-width:600px;width:100%;">
          <tr>
            <td class="content-cell" style="background-color:#FFFFFF;border:1px solid #D1FAE5;border-radius:8px;padding:36px;font-family:Arial,Helvetica,sans-serif;font-size:16px;line-height:1.6;color:#022C22;">
              <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="margin-bottom:16px;">
                <tr>
                  <td style="background-color:#FEF3C7;border:1.5px solid #FCD34D;border-radius:20px;padding:5px 13px;font-size:12px;font-weight:700;color:#92400E;letter-spacing:0.04em;">
                    REMINDER
                  </td>
                </tr>
              </table>
              <p style="margin:0 0 6px;font-size:15px;color:#374151;">Hi {{firstName}},</p>
              <h1 style="margin:0 0 14px;font-size:22px;font-weight:700;color:#022C22;">
                {{senderOrgLabel}} is still waiting for your response.
              </h1>
              <p style="margin:0 0 20px;font-size:14px;color:#4B5563;">
                Request: <strong>{{campaignTitle}}</strong><br />
                Due date: <strong>{{dueDateLabel}}</strong>
              </p>
              <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="margin-bottom:8px;">
                <tr><td align="center" style="border-radius:6px;background-color:#1D4ED8;">
                  <a class="cta-btn" href="{{connectUrl}}" target="_blank" style="display:inline-block;background-color:#1D4ED8;color:#FFFFFF;font-size:14px;font-weight:700;text-decoration:none;padding:11px 24px;border-radius:6px;">{{connectLabel}}</a>
                </td></tr>
              </table>
              <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="margin-bottom:8px;">
                <tr><td align="center" style="border-radius:6px;background-color:#16A34A;">
                  <a class="cta-btn" href="{{acceptUrl}}" target="_blank" style="display:inline-block;background-color:#16A34A;color:#FFFFFF;font-size:14px;font-weight:700;text-decoration:none;padding:11px 24px;border-radius:6px;">Accept request</a>
                </td></tr>
              </table>
              <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="margin-bottom:16px;">
                <tr><td align="center" style="border-radius:6px;background-color:#DC2626;">
                  <a class="cta-btn" href="{{refuseUrl}}" target="_blank" style="display:inline-block;background-color:#DC2626;color:#FFFFFF;font-size:14px;font-weight:700;text-decoration:none;padding:11px 24px;border-radius:6px;">Decline request</a>
                </td></tr>
              </table>
              <p style="margin:0;font-size:12px;color:#9CA3AF;">Guide: <a href="{{docsUrl}}" style="color:#064E3B;">{{docsUrl}}</a></p>
            </td>
          </tr>
          <tr><td style="padding:16px 0 0;font-family:Arial,sans-serif;font-size:11px;color:#9CA3AF;text-align:center;">&copy; {{year}} Tracebud</td></tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>

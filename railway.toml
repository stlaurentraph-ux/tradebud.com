# Railway deploy config for tracebud-backend (monorepo root context).
# Service setting: Root Directory = `.` (repo root), not tracebud-backend.
# https://railway.app

[build]
builder = "DOCKERFILE"
dockerfilePath = "tracebud-backend/Dockerfile"

[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
